{% extends "base.html" %}

{% block title %}Sharing{% endblock %}

{% block content %}
<section class="panel">
  <h2>Sharing</h2>
  <p class="muted">Basic page for assigning document access to other users.</p>
</section>

<section class="panel grid two">
  <article>
    <h3>Share a Document</h3>
    <form method="post" action="#">
      <label for="share_document">Document</label>
      <select id="share_document" name="share_document">
        <option>Example.pdf</option>
      </select>

      <label for="share_user">Share With User</label>
      <input id="share_user" name="share_user" type="text">

      <label for="share_role">Permission</label>
      <select id="share_role" name="share_role">
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="owner">Owner</option>
      </select>

      <button type="submit">Share Document</button>
    </form>
  </article>

  <article>
    <h3>Current Shares</h3>
    <table>
      <thead>
        <tr>
          <th>Document</th>
          <th>User</th>
          <th>Permission</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Example.pdf</td>
          <td>teammate1</td>
          <td>Viewer</td>
        </tr>
      </tbody>
    </table>
  </article>
</section>
{% endblock %}
